services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: netea-postgres
    environment:
      POSTGRES_USER: netea
      POSTGRES_PASSWORD: netea
      POSTGRES_DB: netea_dev
    ports:
      - "5432:5432"
    volumes:
      - netea_pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "netea", "-d", "netea_dev"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  netea_pgdata:
